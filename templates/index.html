<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #444;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        #action-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .top-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .bottom-button {
            display: flex;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1rem;
            margin: 0;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn.secondary {
            background: #6c757d;
        }

        .btn.secondary:hover {
            background: #5a6268;
        }

        .btn.success {
            background: #28a745;
        }

        .btn.success:hover {
            background: #218838;
        }

        .features {
            margin-top: 30px;
            text-align: left;
            padding: 20px;
        }

        .features h2 {
            margin-bottom: 15px;
            color: #444;
        }

        .features ul {
            list-style: none;
        }

        .features li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .features li::before {
            content: '✓';
            color: #28a745;
            margin-right: 10px;
            font-weight: bold;
        }

        footer {
            margin-top: 20px;
            color: white;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .top-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
                max-width: 280px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="project-title">Welcome to Our Game Account Manager Project</h1>

        <p id="project-description">
            Explore the Page by logging in below or creating a new account
        </p>

        <div id="action-buttons">
            <div class="top-buttons">
                <a class="btn" href="{{ url_for('login') }}">Login</a>
                <a class="btn success" href="{{ url_for('register') }}">Sign Up</a>
            </div>

            <div class="bottom-button">
                <a class="btn secondary" href="#features">Learn More</a>
            </div>
        </div>

        <div class="features" id="features">
            <h2>Features</h2>
            <ul id="features-list">
                <li>Feature 1</li>
                <li>Feature 2</li>
                <li>Feature 3</li>
            </ul>
        </div>
    </div>

    <footer>
        &copy; <span id="year"></span> our group name
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        window.addEventListener('load', function() {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';

            setTimeout(() => {
                container.style.transition = 'opacity 0.5s, transform 0.5s';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });

        console.log('Homepage loaded successfully!');
    </script>
</body>
</html>
