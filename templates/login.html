<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 35px 30px;
      width: 100%;
      max-width: 400px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.5s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
      color: #444;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #444;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #667eea;
      color: white;
      border: none;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.3s, transform 0.2s;
    }

    button:hover {
      background-color: #764ba2;
      transform: translateY(-1px);
    }

    .message {
      margin-bottom: 18px;
      text-align: center;
      font-size: 14px;
      min-height: 18px;
      color: rgb(200, 60, 60);
    }

    .back-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      text-decoration: none;
      color: #667eea;
      font-weight: 600;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #764ba2;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="message">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="identifier">Username or Email:</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          placeholder="Enter your username or email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required />
      </div>

      <button type="submit">Login</button>
    </form>

    <a href="{{ url_for('home') }}" class="back-link">Back to Home</a>
  </div>
</body>
</html>
